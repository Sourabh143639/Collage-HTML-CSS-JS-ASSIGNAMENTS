<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>College Event Management</h1>
<p>Join our events</p>

<h2>Events List</h2>
<ul>
    <li>Tech Fest</li>
    <li>Cultural Night</li>
    <li>Sports Day</li>
</ul>

<h2>Event Registration</h2>
<form>
    Name: <input type="text"><br><br>
    Event:
    <select>
        <option>Tech Fest</option>
        <option>Cultural Night</option>
        <option>Sports Day</option>
    </select><br><br>
    <input type="submit" value="Register">
</form>

<h2>Event Schedule</h2>
<table border="1">
    <tr>
        <th>Event</th>
        <th>Date</th>
    </tr>
    <tr>
        <td>Tech Fest</td>
        <td>10 March</td>
    </tr>
</table>

</body>
</html>
