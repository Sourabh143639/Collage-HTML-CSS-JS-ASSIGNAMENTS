<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>KIT College Admission</h1>
<p>Welcome to KIT College. Apply now for the academic year 2026.</p>
<h2>Courses Offer</h2>
<ul>
    <li>B.Tech</li>
    <li>B.Sc</li>
    <li>B.Com</li>
    <li>MBA</li>
</ul>
<h2>Admission Form</h2>
<form>
    Name: <input type="text"><br><br>
    Email: <input type="email"><br><br>
    Course:
    <select>
        <option>B.Tech</option>
        <option>B.Sc</option>
        <option>B.Com</option>
        <option>MBA</option>
    </select><br><br>
    <input type="submit" value="Apply">
</form>

<h2>Fee Structure</h2>
<table border="1">
    <tr>
        <th>Course</th>
        <th>Fees</th>
    </tr>
    <tr>
        <td>B.Tech</td>
        <td>₹80,000</td>
    </tr>
    <tr>
        <td>B.Sc</td>
        <td>₹50,000</td>
    </tr>
</table>
</body>
</html>
