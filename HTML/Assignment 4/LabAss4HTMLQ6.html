<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Online Shopping Store</h1>
<p>Shop your favorite products.</p>

<h2>Product List</h2>
<ul>
    <li>Mobile</li>
    <li>Laptop</li>
    <li>Headphones</li>
</ul>

<h2>Order Form</h2>
<form>
    Name: <input type="text"><br><br>
    Product:
    <select>
        <option>Mobile</option>
        <option>Laptop</option>
        <option>Headphones</option>
    </select><br><br>
    <input type="submit" value="Order">
</form>

<h2>Product Prices</h2>
<table border="1">
    <tr>
        <th>Product</th>
        <th>Price</th>
    </tr>
    <tr>
        <td>Mobile</td>
        <td>₹15,000</td>
    </tr>
</table>
</body>
</html>
