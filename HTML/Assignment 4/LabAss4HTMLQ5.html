<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hotel Booking</h1>
<p>Book your comfortable stay.</p>

<h2>Room Types</h2>
<ul>
    <li>Single Room</li>
    <li>Double Room</li>
    <li>Suite</li>
</ul>

<h2>Booking Form</h2>
<form>
    Name: <input type="text"><br><br>
    Room Type:
    <select>
        <option>Single</option>
        <option>Double</option>
        <option>Suite</option>
    </select><br><br>
    <input type="submit" value="Book">
</form>

<h2>Room Charges</h2>
<table border="1">
    <tr>
        <th>Room Type</th>
        <th>Price</th>
    </tr>
    <tr>
        <td>Single</td>
        <td>₹2000</td>
    </tr>
</table>
</body>
</html>
