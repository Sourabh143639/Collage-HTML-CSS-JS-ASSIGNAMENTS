<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Assignment 3/LabAss3CSSQ2.css">
</head>
<body>

    <div class="product-container">

        <!-- Image Gallery -->
        <div class="gallery">
            <img src="../IMAGES/noise5.webp" class="main-img" alt="Product Image">
            
            <div class="thumbnail">
                <img src="../IMAGES/noise1.webp" alt="">
                <img src="../IMAGES/noise2.webp" alt="">
                <img src="../IMAGES/noise3.webp" alt="">
                <img src="../IMAGES/noise4.webp" alt="">
            </div>
        </div>

        <!-- Product Details -->
        <div class="details">
            <h2>Wireless Headphones</h2>
            <p class="price">₹2,999</p>
            <p class="description">
                High quality wireless headphones with noise cancellation 
                and long battery life. Perfect for music and gaming.
            </p>

            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
