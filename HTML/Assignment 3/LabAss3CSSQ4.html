<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Assignment 3/LabAss3CSSQ4.css">
</head>
<body>
    <section class="pricing">
        <h2 class="title">Our pricing plan</h2>
        <div class="pricing-container">
            <div class="card">
                <h3>Basic</h3>
                <h1>$9</h1>
                <p>Per month</p>
                <ul>
                    <li>1 website</li>
                    <li>Basic support</li>
                    <li>5 GB storage</li>
                </ul>
                   <button>Choose Plan</button>

            </div>
            <div class="popular card">
                <h3>Pro</h3>
                <h1>$19</h1>
                <p>Per month</p>
                <ul>
                    <li>5 website</li>
                    <li>Priority support</li>
                    <li>50 GB storage</li>
                </ul>
                   <button>Choose Plan</button>

            </div>
            <div class="card">
                <h3>Premium</h3>
                <h1>$29</h1>
                <p>Per month</p>
                <ul>
                    <li>Unlimited website</li>
                    <li>24/7 support</li>
                    <li> Unlimited storage</li>
                </ul>
                  <button>Choose Plan</button>

            </div>

        </div>

    </section>
</body>
</html>
