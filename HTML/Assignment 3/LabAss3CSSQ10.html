<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Event Footer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Assignment 3/LabAss3CSSQ10.css">
</head>
<body>

<footer class="footer">

    <div class="footer-container">

        <!-- About Section -->
        <div class="footer-col">
            <h3>Global Event</h3>
            <p>Connecting people worldwide through amazing events and experiences.</p>
        </div>

        <!-- Quick Links -->
        <div class="footer-col">
            <h3>Quick Links</h3>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Speakers</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <!-- Social Media -->
        <div class="footer-col">
            <h3>Follow Us</h3>
            <div class="social-icons">
                <a href="#">🌐 Facebook</a>
                <a href="#">📸 Instagram</a>
                <a href="#">🐦 Twitter</a>
                <a href="#">💼 LinkedIn</a>
            </div>
        </div>

        <!-- Newsletter -->
        <div class="footer-col">
            <h3>Newsletter</h3>
            <p>Subscribe for latest updates</p>
            <form class="newsletter-form">
                <input type="email" placeholder="Enter your email">
                <button type="submit">Subscribe</button>
            </form>
        </div>

    </div>

    <div class="footer-bottom">
        <p>© 2026 Global Event. All Rights Reserved.</p>
    </div>

</footer>

</body>
</html>
