<!DOCTYPE html>
<html>
<head>
    <title>Total Sales and Profit Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f6fc;
            text-align: center;
        }

        h1 {
            background-color: #003366;
            color: white;
            padding: 15px;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #0066cc;
            color: white;
        }

        .total {
            background-color: #d9edf7;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Monthly Sales and Profit Report</h1>

    <table>

        <tr>
            <th rowspan="2">Month</th>
            <th colspan="2">Sales Details (₹)</th>
            <th colspan="2">Profit Details (₹)</th>
        </tr>

        <tr>
            <th>Online Sales</th>
            <th>Offline Sales</th>
            <th>Online Profit</th>
            <th>Offline Profit</th>
        </tr>

        <tr>
            <td>January</td>
            <td>50,000</td>
            <td>40,000</td>
            <td>10,000</td>
            <td>8,000</td>
        </tr>

        <tr>
            <td>February</td>
            <td>60,000</td>
            <td>45,000</td>
            <td>12,000</td>
            <td>9,000</td>
        </tr>

        <tr>
            <td>March</td>
            <td>70,000</td>
            <td>50,000</td>
            <td>15,000</td>
            <td>10,000</td>
        </tr>

        <tr class="total">
            <td colspan="3">Total Sales</td>
            <td colspan="2">2,15,000</td>
        </tr>

        <tr class="total">
            <td colspan="3">Total Profit</td>
            <td colspan="2">64,000</td>
        </tr>

    </table>

</body>
</html>
