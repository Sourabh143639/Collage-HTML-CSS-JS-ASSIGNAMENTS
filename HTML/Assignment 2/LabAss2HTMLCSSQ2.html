<!DOCTYPE html>
<html>
<head>
    <title>Hotel Menu Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f1e4;
            text-align: center;
        }

        h1 {
            color: darkred;
        }

        h2 {
            color: darkgreen;
        }

        /* Table Styling */
        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: orange;
            color: white;
        }

        /* List Styling */
        ul {
            list-style-type: square;
            padding: 20px;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Welcome to Royal Palace Hotel</h1>

    <h2>Today's Special Menu</h2>

    <!-- Food Table -->
    <table>
        <tr>
            <th>Food Item</th>
            <th>Price (₹)</th>
        </tr>

        <tr>
            <td>Paneer Butter Masala</td>
            <td>250</td>
        </tr>

        <tr>
            <td>Veg Biryani</td>
            <td>180</td>
        </tr>

        <tr>
            <td>Masala Dosa</td>
            <td>120</td>
        </tr>

        <tr>
            <td>Cold Coffee</td>
            <td>90</td>
        </tr>
    </table>

    <h2>Available Starters</h2>

    <!-- List -->
    <ul>
        <li>Tomato Soup</li>
        <li>Spring Rolls</li>
        <li>French Fries</li>
        <li>Chilli Paneer</li>
    </ul>

</body>
</html>
